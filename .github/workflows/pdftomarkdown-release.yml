name: Build and Release PdfToMarkdown

on:
  push:
    branches: [ "main" ]
    paths:
      - 'PdfToMarkdown/**'
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'PdfToMarkdown/**'

permissions:
  contents: write

jobs:

  build:

    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # Detect if PdfToMarkdown changed
    - name: Check for changes
      id: changes
      run: |
        git fetch origin main
        git diff --quiet origin/main HEAD -- PdfToMarkdown
        if ($LASTEXITCODE -eq 0) {
          echo "changed=false" >> $env:GITHUB_OUTPUT
        } else {
          echo "changed=true" >> $env:GITHUB_OUTPUT
        }
        exit 0

    - name: Stop if no changes
      if: steps.changes.outputs.changed == 'false'
      run: |
        echo "No changes in PdfToMarkdown. Skip build."
        exit 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    - name: Generate version
      id: version
      run: |
        $date = Get-Date -Format "yyyy.MM.dd"
        $run = $env:GITHUB_RUN_NUMBER
        $version = "$date.$run"
        echo "version=$version" >> $env:GITHUB_OUTPUT

    - name: Publish self-contained exe
      run: |
        dotnet publish PdfToMarkdown/PdfToMarkdown/PdfToMarkdown.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:Version=${{ steps.version.outputs.version }} `
          -o publish

    - name: Zip output
      run: Compress-Archive -Path publish/* -DestinationPath PdfToMarkdown-${{ steps.version.outputs.version }}.zip

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: pdftomarkdown-${{ steps.version.outputs.version }}
        name: PdfToMarkdown ${{ steps.version.outputs.version }}
        files: PdfToMarkdown-${{ steps.version.outputs.version }}.zip
