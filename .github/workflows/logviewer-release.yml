name: Build and Release LogViewer

on:
  push:
    branches: [ "main" ]
    paths:
      - 'LogViewer/**'
  workflow_dispatch:
#  pull_request:
#    branches: [ "main" ]
#    paths:
#      - 'LogViewer/**'

permissions:
  contents: write
  
jobs:

  build:

    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      
    # 🔹 Detect if LogViewer changed
    - name: Check for changes
      id: changes
      run: |
        git fetch origin main
        git diff --quiet origin/main HEAD -- LogViewer
        if ($LASTEXITCODE -eq 0) {
          echo "changed=false" >> $env:GITHUB_OUTPUT
        } else {
          echo "changed=true" >> $env:GITHUB_OUTPUT
        }
        exit 0

    - name: Stop if no changes
      if: steps.changes.outputs.changed == 'false'
      run: |
        echo "No changes in LogViewer. Skip build."
        exit 0
        
    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Add  MSBuild to the PATH: https://github.com/microsoft/setup-msbuild
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    # Restore the application to populate the obj folder with RuntimeIdentifiers
    - name: Restore dependencies
      run: dotnet restore LogViewer/LogViewer.slnx

    # 🔹 Auto version
    - name: Generate version
      id: version
      run: |
        $date = Get-Date -Format "yyyy.MM.dd"
        $run = $env:GITHUB_RUN_NUMBER
        $version = "$date.$run"
        echo "version=$version" >> $env:GITHUB_OUTPUT

    # Decode the base 64 encoded pfx and save the Signing_Certificate
    - name: Publish
      run: |
        dotnet publish LogViewer/LogViewer/LogViewer.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:EnableCompressionInSingleFile=true `
          -p:DebugType=None `
          -p:DebugSymbols=false `
          -p:Version=${{ steps.version.outputs.version }} `
          -p:FileVersion=${{ steps.version.outputs.version }} `
          -p:AssemblyVersion=${{ steps.version.outputs.version }} `
          -o publish

    - name: Zip output
      #run: Compress-Archive -Path publish/* -DestinationPath LogViewer.zip
      run: Compress-Archive publish/* LogViewer-${{ steps.version.outputs.version }}.zip
      
    # 🔹 Create or update daily release
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: daily-${{ steps.version.outputs.version }}
        name: Regular Build ${{ steps.version.outputs.version }}
        files: LogViewer-${{ steps.version.outputs.version }}.zip
  
